<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Whisky Music</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0E0B07; color: #F4ECDC;
    font-family: 'Cormorant Garamond', Georgia, serif; overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 24px; }
  .disc { width: 96px; height: 96px; border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, #1a130a 0 22%, #D8A35C 22% 28%, #1a130a 28% 96%, #2a1f10 96%);
    box-shadow: 0 8px 40px rgba(216,163,92,0.25), inset 0 0 30px rgba(0,0,0,0.6);
    animation: spin 4s linear infinite;
    position: relative;
  }
  .disc::after { content: ''; position: absolute; top: 50%; left: 50%; width: 12px; height: 12px;
    border-radius: 50%; background: #D8A35C; transform: translate(-50%, -50%); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .title { font-size: 28px; letter-spacing: 0.4em; font-weight: 300; }
  .sub { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; letter-spacing: 0.3em;
    text-transform: uppercase; color: rgba(244,236,220,0.4); }
</style>
</head>
<body>
  <div class="disc"></div>
  <div class="title">WHISKY</div>
  <div class="sub">tuning your library</div>
</body>
</html>
